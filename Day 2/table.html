<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Day 2 Tables</title>
</head>

<body>
    <table border="2" cellspacing="0" cellpadding="12">
        <caption>
            Student Table
        </caption>
        <thead>
            <tr>
                <th>S.no</th>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>John</td>
                <td>25</td>
                <td>New York</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Umar</td>
                <td>20</td>
                <td>Los Anglas</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td rowspan="2">Total</td>
                <td colspan="3">2</td> 
            </tr>
            <tr>
                <td colspan="3">Avg: age</td>
            </tr>
        </tfoot>

    </table>
</body>

</html>
